# 锋哥量化投资策略配置
# 版本：1.0.0
# 最后更新：2026-03-29

# ==================== 市场状态识别规则 ====================
market_state_rules:
  # 牛市条件（需同时满足）
  bull_conditions:
    rsi_threshold: 55          # RSI>55（优化后：50→55）
    breadth_threshold: 0.65    # 市场广度>65%（优化后：60%→65%）
    ma250_slope_min: 0.001     # MA250 斜率>0.001
    price_above_ma250: true    # 价格>MA250
  
  # 熊市条件（满足任意 2 个及以上）
  bear_conditions:
    rsi_threshold: 35          # RSI<35（优化后：40→35）
    breadth_threshold: 0.35    # 市场广度<35%（优化后：40%→35%）
    ma250_slope_max: -0.001    # MA250 斜率<-0.001
    price_below_ma250: true    # 价格<MA250

# ==================== 投资组合配置 ====================
portfolio_config:
  # 牛市配置
  bull_market:
    stock_pool_size: [160, 170]    # 股票池规模
    position_ratio: [0.85, 0.95]   # 仓位范围（优化后：90-100%→85-95%）
    single_stock_max: 0.05         # 单只股票上限 5%
    industry_max: 0.20             # 行业集中度上限 20%
    
    # 行业权重调整
    sector_adjustment:
      overweight:
        周期：0.20
        成长：0.15
      underweight:
        防御：-0.10
    
    # 个股筛选规则
    stock_selection:
      beta_min: 1.2                # 优先高 Beta 股票
      pe_max: 35                   # PE 放宽至 35
      revenue_growth_min: 0.20     # 营收增长>20%
      momentum_weight: 0.40        # 动量因子权重 40%
  
  # 熊市配置
  bear_market:
    stock_pool_size: [50, 55]      # 股票池规模（优化后：60→50-55）
    position_ratio: [0.40, 0.60]   # 仓位范围（优化后：50-70%→40-60%）
    single_stock_max: 0.05
    industry_max: 0.20
    
    sector_adjustment:
      overweight:
        防御：0.25
        高股息：0.15
      underweight:
        周期：-0.20
      avoid:
        - 高波动
        - 科技
        - 可选消费
    
    stock_selection:
      debt_ratio_max: 0.40         # 负债率<40%
      dividend_yield_min: 0.03     # 股息率>3%
      fcf_margin_min: 0.10         # FCF/营收>10%
      volatility_max: industry_avg # 低波动股票
  
  # 震荡市配置
  sideways_market:
    stock_pool_size: [110, 115]    # 股票池规模（优化后：120→110-115）
    position_ratio: [0.65, 0.80]   # 仓位范围（优化后：70-85%→65-80%）
    single_stock_max: 0.05
    industry_max: 0.20
    
    sector_adjustment:
      overweight:
        消费：0.05
        医药：0.05
        公用事业：0.05
      underweight:
        金融：-0.05
        地产：-0.05
        原材料：-0.05
    
    stock_selection:
      roe_stability: high          # ROE 稳定性高
      pe_max: 25                   # PE<25
      volatility_max: industry_avg # 低波动
      dividend_years_min: 3        # 连续 3 年分红

# ==================== 回测参数 ====================
backtest_params:
  start_date: '2016-03-28'
  end_date: '2026-03-28'
  initial_capital: 10000000        # 1000 万初始资金
  transaction_cost: 0.001          # 交易成本 0.1%
  rebalance_frequency: 'quarterly' # 季度调仓
  rebalance_timing: 'first_trading_day_after_earnings'  # 财报披露后首个交易日

# ==================== 风险控制参数 ====================
risk_control:
  max_drawdown_stop: -0.15         # 最大回撤止损 -15%
  stop_loss: -0.12                 # 个股止损 -12%
  max_turnover: 0.30               # 最大换手率 30%
  min_liquidity: 50000000          # 最小成交额 5000 万
  min_market_cap: 3000000000       # 最小市值 30 亿

# ==================== 因子权重配置 ====================
factor_weights:
  quality: 0.35    # 质量因子 35%
  momentum: 0.25   # 动量因子 25%
  value: 0.20      # 价值因子 20%
  technical: 0.15  # 技术因子 15%
  sentiment: 0.05  # 情绪因子 5%

# ==================== 数据源配置 ====================
data_source:
  primary: 'futudnd'              # 主数据源：富途 OpenD
  backup: 'akshare'               # 备用数据源：AKShare
  update_frequency: 'realtime'    # 更新频率：实时

# ==================== 绩效目标 ====================
performance_targets:
  annualized_return: 0.1155       # 年化收益目标 11.55%
  max_drawdown: -0.2478           # 最大回撤控制 -24.78%
  sharpe_ratio: 1.08              # 夏普比率目标 1.08
  win_rate: 0.65                  # 胜率目标 65%
